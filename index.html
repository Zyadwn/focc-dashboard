<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FOCC Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img src="IMG_8797.webp" class="logo">

<h1>FOCC</h1>

<h2>Fire Operations Control Center</h2>

<p>King Abdulaziz International Airport</p>

</header>

<section class="grid4">

<div class="card">
<span class="title">LOCAL TIME</span>
<div id="localTime" class="value">00:00</div>
</div>

<div class="card">
<span class="title">ZULU TIME</span>
<div id="zuluTime" class="value">00:00</div>
</div>

<div class="card">
<span class="title">GREGORIAN</span>
<div id="gregorianDate" class="value-small"></div>
</div>


</section>
<section class="grid4">

<div class="card">
<span class="title">WEATHER</span>
<div id="weather" class="value-small">Loading...</div>
</div>

<div class="card">
<span class="title">RUNWAY IN USE</span>
<div id="runway" class="value-small">34L / 16R</div>
</div>

<div class="card">
<span class="title">AIRPORT INFORMATION</span>
<div id="airportInfo" class="value-small">
Terminal 1 • North Terminal • Hajj Terminal
</div>
</div>

<div class="card">
<span class="title">NOTICE BOARD</span>
<div id="notice" class="value-small">
Welcome to FOCC
</div>
</div>

</section>

<script src="script.js"></script>

</body>

</html>
