<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FOCC Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img src="jedco-logo.png" class="logo">

<h1>FOCC</h1>

<h2>Fire Operations Control Center</h2>

<p>King Abdulaziz International Airport</p>

</header>

<section class="grid4">

<div class="card">
<span class="title">LOCAL TIME</span>
<div id="localTime" class="value">00:00</div>
</div>

<div class="card">
<span class="title">ZULU TIME</span>
<div id="zuluTime" class="value">00:00</div>
</div>

<div class="card">
<span class="title">GREGORIAN</span>
<div id="gregorianDate" class="value-small"></div>
</div>

<div class="card">
<span class="title">HIJRI</span>
<div id="hijriDate" class="value-small"></div>
</div>

</section>

<script src="script.js"></script>

</body>

</html>
